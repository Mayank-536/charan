version: "3.8"

services:
  app:
    build: .
    container_name: printing_press_api
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - ACCESS_TOKEN_TTL=${ACCESS_TOKEN_TTL:-15m}
      - REFRESH_TOKEN_TTL=${REFRESH_TOKEN_TTL:-7d}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-printing_press}
      - DB_USER=${DB_USER:-printing_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - BW_PER_PAGE=${BW_PER_PAGE:-2}
      - COLOR_PER_PAGE=${COLOR_PER_PAGE:-8}
      - GST_PERCENT=${GST_PERCENT:-18}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - printing_network

  postgres:
    image: postgres:15-alpine
    container_name: printing_press_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-printing_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-printing_press}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-printing_user} -d ${DB_NAME:-printing_press}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - printing_network
    # Uncomment to expose PostgreSQL externally (not recommended for production)
    # ports:
    #   - "5432:5432"

networks:
  printing_network:
    driver: bridge

volumes:
  postgres_data:
