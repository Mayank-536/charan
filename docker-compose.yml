version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: printing_press_db
    environment:
      POSTGRES_USER: printing_user
      POSTGRES_PASSWORD: printing_pass
      POSTGRES_DB: printing_press
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U printing_user -d printing_press"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
